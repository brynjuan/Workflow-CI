name: MLflow CI Workflow (Advance)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn
# Cek isi direktori sebelum menjalankan MLflow (Untuk Debugging)
      - name: Cek Struktur Folder
        run: |
          pwd
          ls -R
# Menjalankan MLflow Project untuk Re-training
      - name: Run MLflow Project
        run: mlflow run MLProject --env-manager=local --experiment-name="Bank_Marketing_Retraining"
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.DAGSHUB_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PASSWORD }}

      # Login ke Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# Build Docker Image dengan mem-bypass Bug MLflow & Pip
      - name: Build and Push Docker Image
        run: |
          # 1. Minta MLflow membuatkan folder berisi model dan Dockerfile mentah
          mlflow models generate-dockerfile -m model_output -d docker_build_dir
          
          # 2. HACK: Gunakan 'sed' untuk mengganti URL get-pip yang mati ke versi 3.9 yang masih hidup
          sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' docker_build_dir/Dockerfile
          
          # 3. Build Docker Image secara manual menggunakan resep yang sudah diperbaiki
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bank-marketing-model:latest docker_build_dir
          
          # 4. Push Image ke Docker Hub
          docker push ${{ secrets.DOCKER_USERNAME }}/bank-marketing-model:latest